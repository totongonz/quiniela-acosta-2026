<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Acosta · Mundial 2026</title>
<style>
  :root{
    --ink:#14181F; --canvas:#FFFFFF; --surface:#F4F6F8; --line:#E6E9EE;
    --blue:#0B6BCB; --green:#009A49; --red:#E03A3E; --gold:#F2B705; --gray:#5B6470;
    --muted:#8A929E;
    --radius:20px; --radius-sm:13px;
    --shadow:0 1px 3px rgba(20,24,31,.04), 0 8px 28px rgba(20,24,31,.06);
    --font:-apple-system,'SF Pro Display','Segoe UI',system-ui,Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font);background:var(--surface);color:var(--ink);
       -webkit-font-smoothing:antialiased;line-height:1.45;}
  /* fondo mesh con la paleta tri-nación (muy suave) */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(820px 520px at 88% -8%,  rgba(11,107,203,.09), transparent 62%),
      radial-gradient(700px 480px at -12% 28%, rgba(0,154,73,.07),   transparent 60%),
      radial-gradient(760px 560px at 108% 82%, rgba(242,183,5,.06),  transparent 60%),
      radial-gradient(540px 420px at 12% 108%, rgba(224,58,62,.05),  transparent 60%);}
  /* listón tricolor de los 3 anfitriones */
  .ribbon{position:fixed;top:0;left:0;right:0;height:4px;z-index:60;
    background:linear-gradient(90deg,var(--green) 0 33.4%,var(--blue) 33.4% 66.7%,var(--red) 66.7% 100%);}
  .wrap{max-width:940px;margin:0 auto;padding:0 20px 80px;}
  a{color:inherit;text-decoration:none;}

  header{padding:40px 0 8px;text-align:center;}
  .brand{font-size:30px;font-weight:800;letter-spacing:-.025em;}
  .brand .em{background:linear-gradient(120deg,var(--blue),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tagline{font-size:14px;color:var(--muted);margin-top:5px;font-weight:500;}
  .prizebar{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  .prize{display:flex;align-items:center;gap:7px;background:var(--canvas);border:1px solid var(--line);
         border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);}
  .prize .dot{width:9px;height:9px;border-radius:50%;}
  .prize small{color:var(--muted);font-weight:500;}

  nav{position:sticky;top:10px;z-index:50;display:flex;gap:4px;justify-content:center;
      background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(14px);
      border:1px solid var(--line);border-radius:999px;padding:5px;margin:22px auto;max-width:560px;box-shadow:var(--shadow);}
  .tab{flex:1;padding:9px 6px;border:none;background:transparent;font-family:var(--font);
       font-size:13.5px;font-weight:600;color:var(--muted);border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap;}
  .tab.active{background:linear-gradient(135deg,var(--blue),#0a4f97);color:#fff;}
  .tab:hover:not(.active){color:var(--ink);}

  section{display:none;}
  section.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  /* entrada escalonada de tarjetas al abrir cada pestaña */
  section.active>*,section.active .bento>*,section.active .main>*{
    animation:rise .38s cubic-bezier(.22,.7,.3,1) backwards;}
  section.active>*:nth-child(2),section.active .bento>*:nth-child(2),section.active .main>*:nth-child(2){animation-delay:.05s}
  section.active>*:nth-child(3),section.active .bento>*:nth-child(3),section.active .main>*:nth-child(3){animation-delay:.10s}
  section.active>*:nth-child(4),section.active .bento>*:nth-child(4),section.active .main>*:nth-child(4){animation-delay:.15s}
  section.active>*:nth-child(5),section.active .bento>*:nth-child(5),section.active .main>*:nth-child(5){animation-delay:.20s}
  section.active>*:nth-child(6),section.active .bento>*:nth-child(6),section.active .main>*:nth-child(6){animation-delay:.25s}
  section.active>*:nth-child(7),section.active .bento>*:nth-child(7),section.active .main>*:nth-child(7){animation-delay:.30s}
  section.active>*:nth-child(n+8),section.active .bento>*:nth-child(n+8),section.active .main>*:nth-child(n+8){animation-delay:.34s}

  .card{background:var(--canvas);border:1px solid var(--line);border-radius:var(--radius);
        box-shadow:var(--shadow);padding:24px;margin-bottom:16px;}
  .card-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

  /* HERO countdown (pre) */
  .hero{background:linear-gradient(135deg,#0B6BCB 0%,#0a4f97 55%,#073b72 100%);color:#fff;
        border-radius:var(--radius);padding:34px;text-align:center;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden;}
  .hero:after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);}
  .hero:before{content:"";position:absolute;left:-60px;bottom:-70px;width:200px;height:200px;border-radius:50%;background:rgba(0,154,73,.22);filter:blur(2px);}
  .hero .k{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.8;}
  .hero .big{font-size:62px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:6px 0;}
  .hero .match{font-size:16px;font-weight:600;opacity:.95;}
  .hero .when{font-size:13px;opacity:.7;margin-top:3px;}

  .stat{background:var(--surface);border-radius:var(--radius-sm);padding:16px 18px;}
  .stat .v{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .stat .l{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
  .stat .sub{font-size:12.5px;color:var(--ink);margin-top:6px;font-weight:600;}

  .roster{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:999px;padding:6px 12px 6px 6px;font-size:13px;font-weight:600;}
  .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;}

  /* Leaderboard */
  .lb{width:100%;border-collapse:collapse;}
  .lb th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;padding:0 10px 10px;font-weight:700;}
  .lb th.r,.lb td.r{text-align:right;}
  .lb td{padding:12px 10px;border-top:1px solid var(--line);font-size:14.5px;vertical-align:middle;}
  .lb tr:first-child td{border-top:none;}
  .lb .rank{font-weight:800;width:30px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .lb .who{font-weight:700;display:flex;align-items:center;gap:10px;}
  .lb .pts{font-weight:800;font-variant-numeric:tabular-nums;}
  .lb .sub{font-size:12px;color:var(--muted);font-weight:500;}
  .mv{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;}
  .mv.up{color:var(--green);} .mv.dn{color:var(--red);} .mv.eq{color:var(--muted);}
  tr.p-first{background:linear-gradient(90deg,rgba(242,183,5,.10),transparent);}
  tr.p-second{background:linear-gradient(90deg,rgba(11,107,203,.08),transparent);}
  tr.p-last{background:linear-gradient(90deg,rgba(224,58,62,.08),transparent);}
  .pz{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;letter-spacing:.03em;}
  .pz.first{background:var(--gold);color:#5a4400;} .pz.second{background:var(--blue);} .pz.last{background:var(--red);}

  .banner{background:linear-gradient(120deg,rgba(11,107,203,.08),rgba(0,154,73,.08));
          border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 18px;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:14px;}
  .banner b{color:var(--blue);}

  /* Calendar */
  .day{margin-bottom:18px;}
  .day-h{display:flex;align-items:baseline;gap:10px;margin:0 4px 10px;}
  .day-h .d{font-size:16px;font-weight:800;letter-spacing:-.01em;text-transform:capitalize;}
  .day-h .n{font-size:12px;color:var(--muted);font-weight:600;}
  .mrow{display:grid;grid-template-columns:34px 1fr auto 1fr 70px;align-items:center;gap:8px;
        padding:10px 14px;border-top:1px solid var(--line);font-size:14px;}
  .mrow:first-child{border-top:none;}
  .mrow .mn{font-size:11px;color:var(--muted);font-weight:700;}
  .mrow .ta{text-align:right;font-weight:600;}
  .mrow .tb{text-align:left;font-weight:600;}
  .mrow .sc{font-weight:800;font-variant-numeric:tabular-nums;text-align:center;min-width:48px;}
  .mrow .sc.pend{color:var(--muted);font-weight:600;}
  .mrow .vn{font-size:11px;color:var(--muted);text-align:right;font-style:italic;}
  .gp{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;background:var(--surface);color:var(--gray);}

  /* Participants grid */
  .sel{font-family:var(--font);font-size:14px;font-weight:600;padding:10px 14px;border-radius:12px;
       border:1px solid var(--line);background:var(--canvas);color:var(--ink);box-shadow:var(--shadow);min-width:200px;}
  .pgrid .g{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--blue);margin:16px 0 6px;}
  .pk{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;gap:8px;padding:7px 10px;border-top:1px solid var(--line);font-size:13.5px;}
  .pk:first-of-type{border-top:none;}
  .pk .a{text-align:right;font-weight:600;} .pk .b{text-align:left;font-weight:600;}
  .pk .s{text-align:center;font-weight:800;background:var(--surface);border-radius:8px;padding:3px 0;font-variant-numeric:tabular-nums;}
  .pk .s.exact{background:rgba(0,154,73,.16);color:var(--green);}
  .pk .s.outcome{background:rgba(242,183,5,.18);color:#9a7700;}
  .pk .s.miss{background:#F1F2F4;color:var(--muted);}

  /* profile + head-to-head */
  .prof{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 10px;}
  .pchip{background:var(--surface);border-radius:13px;padding:11px 15px;min-width:74px;}
  .pchip .v{font-size:20px;font-weight:800;letter-spacing:-.01em;}
  .pchip .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px;}
  .cmp{display:grid;grid-template-columns:1fr 48px 48px 1fr;align-items:center;gap:7px;padding:7px 10px;border-top:1px solid var(--line);font-size:13.5px;}
  .cmp:first-of-type{border-top:none;}
  .cmp .a{text-align:right;font-weight:600;} .cmp .b{text-align:left;font-weight:600;}
  .cmp .s{text-align:center;font-weight:800;background:var(--surface);border-radius:7px;padding:3px 0;font-size:12.5px;font-variant-numeric:tabular-nums;}
  .cmp .s.exact{background:rgba(0,154,73,.16);color:var(--green);}
  .cmp .s.outcome{background:rgba(242,183,5,.18);color:#9a7700;}
  .cmp .s.miss{background:#F1F2F4;color:var(--muted);}
  .cmp-h .s{background:transparent;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}

  .empty{text-align:center;padding:46px 24px;color:var(--muted);}
  .empty .ic{font-size:40px;margin-bottom:10px;}
  .empty .h{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .empty p{font-size:14px;max-width:420px;margin:0 auto;}

  .mrow{cursor:pointer;border-radius:10px;transition:background .12s;}
  .mrow:hover{background:var(--surface);}
  .simul{font-size:11.5px;font-weight:700;color:var(--blue);padding:4px 4px 8px;display:flex;align-items:center;gap:6px;}
  .simul:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--blue);}

  /* sparkline */
  .spark{display:inline-block;vertical-align:middle;}

  /* modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(20,24,31,.45);backdrop-filter:blur(6px);
         z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal.open{display:flex;animation:fade .2s ease;}
  .modal-card{background:var(--canvas);border-radius:var(--radius);max-width:460px;width:100%;
              max-height:86vh;overflow:auto;padding:26px;position:relative;box-shadow:0 24px 70px rgba(0,0,0,.3);}
  .modal-x{position:absolute;top:16px;right:16px;border:none;background:var(--surface);width:30px;height:30px;
           border-radius:50%;cursor:pointer;font-size:13px;color:var(--gray);}
  .mh-g{font-size:12px;color:var(--muted);font-weight:600;}
  .mh-teams{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:17px;font-weight:800;margin:8px 0;}
  .mh-sc{font-variant-numeric:tabular-nums;color:var(--blue);}
  .mh-sc.pend{color:var(--muted);font-size:13px;font-weight:700;}
  .mh-cons{font-size:12.5px;color:var(--gray);background:var(--surface);border-radius:10px;padding:9px 12px;margin-bottom:14px;}
  .mp-list{display:flex;flex-direction:column;gap:3px;}
  .mp{display:grid;grid-template-columns:1fr auto 38px;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;font-size:13.5px;background:var(--surface);}
  .mp-n{font-weight:600;} .mp-s{font-weight:800;font-variant-numeric:tabular-nums;} .mp-p{text-align:right;font-weight:800;font-size:12px;color:var(--muted);}
  .mp.exact{background:rgba(0,154,73,.13);} .mp.exact .mp-p{color:var(--green);}
  .mp.outcome{background:rgba(242,183,5,.16);} .mp.outcome .mp-p{color:#9a7700;}
  .mp.miss{opacity:.6;}

  /* bump chart */
  .bump-wrap{overflow-x:auto;}
  .bump line.grid{stroke:var(--line);stroke-width:1;}
  .bump text{font-family:var(--font);}
  .bump .pl{fill:none;stroke-width:2.5;opacity:.85;transition:opacity .15s,stroke-width .15s;cursor:pointer;}
  .bump .dot{transition:opacity .15s;cursor:pointer;}
  .bump .endlab{font-size:11px;font-weight:700;cursor:pointer;}
  .bump.focus .pl{opacity:.12;} .bump.focus .pl.on{opacity:1;stroke-width:4;}
  .bump.focus .dot{opacity:.12;} .bump.focus .dot.on{opacity:1;}
  .bump.focus .endlab{opacity:.2;} .bump.focus .endlab.on{opacity:1;}
  .bump-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
  .lg{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--surface);cursor:pointer;transition:.12s;user-select:none;}
  .lg .lgd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .lg.on{background:var(--ink);color:#fff;}

  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px;}

  /* ---- bento (Hoy) ---- */
  .bento{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;}
  .bento>*{grid-column:1/-1;margin-bottom:0;}
  @media(min-width:700px){
    .bento .sp4{grid-column:span 4;} .bento .sp5{grid-column:span 5;}
    .bento .sp6{grid-column:span 6;} .bento .sp7{grid-column:span 7;}
    .bento .sp8{grid-column:span 8;}
  }

  /* ---- tarjetas con tinte de la paleta ---- */
  .card.tb{background:linear-gradient(150deg,rgba(11,107,203,.08),#fff 58%);border-color:rgba(11,107,203,.18);}
  .card.tg{background:linear-gradient(150deg,rgba(0,154,73,.08),#fff 58%);border-color:rgba(0,154,73,.18);}
  .card.tr{background:linear-gradient(150deg,rgba(224,58,62,.07),#fff 58%);border-color:rgba(224,58,62,.18);}
  .card.ty{background:linear-gradient(150deg,rgba(242,183,5,.11),#fff 58%);border-color:rgba(242,183,5,.26);}
  .card.tb .stat,.card.tg .stat,.card.tr .stat,.card.ty .stat{background:transparent;padding:6px 2px 0;}

  /* tarjetas clicables: se elevan al pasar el mouse */
  .card.click{cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;}
  .card.click:hover{transform:translateY(-2px);box-shadow:0 2px 6px rgba(20,24,31,.05),0 16px 40px rgba(20,24,31,.11);}

  /* ---- banderas ---- */
  .fl{display:inline-block;}
  .flimg{vertical-align:-2px;border-radius:2.5px;box-shadow:0 0 0 .5px rgba(20,24,31,.18);}

  /* ---- barra lateral (solo escritorio) ---- */
  .split{display:block;}
  .rail{display:none;}
  .rrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line);font-size:13px;}
  .rrow:first-of-type{border-top:none;}
  .rrow .ric{width:22px;text-align:center;flex-shrink:0;}
  .rrow .rlab{flex:1;font-weight:600;color:var(--ink);}
  .rrow .rpct{font-weight:800;font-variant-numeric:tabular-nums;}

  /* ---- escritorio ---- */
  @media(min-width:1024px){
    .wrap{max-width:1180px;}
    .brand{font-size:34px;}
    .hero{padding:40px;}
    .hero .big{font-size:74px;}
    .stat .v{font-size:30px;}
    .lb td{padding:13px 12px;}
    .lb .pts{font-size:17px;}
    .split{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;align-items:start;}
    .rail{display:block;position:sticky;top:84px;}
    .rail .card{padding:16px 18px;margin-bottom:12px;}
  }

  @media(prefers-reduced-motion:reduce){
    section.active>*,section.active .bento>*,section.active .main>*{animation:none!important;}
    .card.click,.tab,.mrow{transition:none!important;}
  }

  @media(max-width:620px){
    .grid2,.grid3{grid-template-columns:1fr;}
    .hero .big{font-size:48px;}
    .mrow{grid-template-columns:28px 1fr auto 1fr;}
    .mrow .vn{display:none;}
    .lb .hide-m{display:none;}
  }
</style>
</head>
<body>
<div class="ribbon"></div>
<div class="wrap">
  <header>
    <div class="brand">Quiniela <span class="em">Acosta</span></div>
    <div class="tagline" id="tagline">Mundial 2026 · Fase de Grupos</div>
    <div class="prizebar" id="prizebar"></div>
  </header>

  <nav id="nav">
    <button class="tab active" data-s="hoy">Hoy</button>
    <button class="tab" data-s="tabla">Tabla</button>
    <button class="tab" data-s="calendario">Calendario</button>
    <button class="tab" data-s="participantes">Participantes</button>
    <button class="tab" data-s="evolucion">Evolución</button>
  </nav>

  <section class="active" id="hoy"></section>
  <section id="tabla"></section>
  <section id="calendario"></section>
  <section id="participantes"></section>
  <section id="evolucion"></section>

  <div class="foot" id="foot"></div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modalbody"></div>
  </div>

// ---- helpers ----
const $ = (id)=>document.getElementById(id);
const PAL = ['#0B6BCB','#009A49','#E03A3E','#F2B705','#7A3FF2','#00A3A8','#FF7A00','#5B6470',
             '#C2185B','#2E7D32','#1565C0','#6A1B9A','#00838F','#E65100','#AD1457','#37474F',
             '#0097A7','#558B2F','#8E24AA'];
const colorFor = (i)=>PAL[i%PAL.length];
const MES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIA = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
function fdate(iso){const d=new Date(iso+'T12:00:00');return `${DIA[d.getDay()]} ${d.getDate()} ${MES[d.getMonth()]}`;}
function initials(s){return s.replace(/[^A-Za-zÀ-ÿ ]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';}
const byId = {}; DATA.participants.forEach((p,i)=>byId[p.id]={...p,color:colorFor(i)});
const matchByNum = {}; DATA.matches.forEach(m=>matchByNum[m.num]=m);
const nm = id => (byId[id] && byId[id].display) || id;   // nombre de pila Cccc

// avatar con degradado (más vivo que el color plano)
function shade(hex,f){
  const n=parseInt(hex.slice(1),16);
  const cl=v=>Math.max(0,Math.min(255,v));
  return `rgb(${cl((n>>16)+f)},${cl(((n>>8)&255)+f)},${cl((n&255)+f)})`;
}
const avBg = c=>`background:linear-gradient(135deg,${c},${shade(c,-38)})`;

// banderas: emoji donde se ven (móvil/Mac), imagen donde no (Windows)
const FLAG_EMOJI_OK = (function(){
  try{
    const cv=document.createElement('canvas');cv.width=cv.height=24;
    const g=cv.getContext('2d');g.textBaseline='top';g.font='20px sans-serif';
    g.fillText('\u{1F1F2}\u{1F1FD}',0,0);
    const d=g.getImageData(0,0,24,24).data;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]>8 && (Math.abs(d[i]-d[i+1])>16 || Math.abs(d[i+1]-d[i+2])>16)) return true;
    }
    return false;
  }catch(e){return true;}
})();
function flagEmoji(code){
  if(code==='gb-eng') return '\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}';
  if(code==='gb-sct') return '\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}';
  return String.fromCodePoint(...[...code.toUpperCase()].map(ch=>127397+ch.charCodeAt(0)));
}
function fl(code){
  if(!code) return '';
  return FLAG_EMOJI_OK
    ? `<span class="fl">${flagEmoji(code)}</span>`
    : `<img class="flimg" src="https://flagcdn.com/24x18/${code}.png" srcset="https://flagcdn.com/48x36/${code}.png 2x" width="20" height="15" alt="" loading="lazy">`;
}

// ---- prize bar + banderas anfitrionas ----
(function(){
  const map={first:'var(--gold)',second:'var(--blue)',last:'var(--red)'};
  $('prizebar').innerHTML = DATA.prize.structure.map(p=>
    `<span class="prize"><span class="dot" style="background:${map[p.key]}"></span>${p.label} <small>${p.pct}%</small></span>`
  ).join('');
  $('tagline').innerHTML += ` &nbsp;${fl('mx')} ${fl('us')} ${fl('ca')}`;
})();

// ---- barra lateral (escritorio): premios, puntos y contexto ----
function railHTML(){
  const live = DATA.state!=='pre';
  const st = DATA.standings;
  const ic = {first:'🏆',second:'🥈',last:'🔻'};
  const hold = st.length ? {first:st[0],second:st[1],last:st[st.length-1]} : {};
  const rows = DATA.prize.structure.map(p=>`<div class="rrow">
      <span class="ric">${ic[p.key]||'·'}</span>
      <span class="rlab">${p.label}${live&&hold[p.key]?` · <b>${nm(hold[p.key].id)}</b>`:''}</span>
      <span class="rpct">${p.pct}%</span></div>`).join('');
  const score = `<div class="rrow"><span class="ric">🎯</span><span class="rlab">Marcador exacto</span><span class="rpct">+${DATA.scoring.exact}</span></div>
    <div class="rrow"><span class="ric">✓</span><span class="rlab">Solo el resultado</span><span class="rpct">+${DATA.scoring.outcome}</span></div>`;
  let extra='';
  if(live){
    const top = st.slice(0,5).map(r=>`<div class="rrow">
      <span class="ric" style="font-weight:800;color:var(--muted)">${r.rank}</span>
      <span class="rlab">${nm(r.id)}</span><span class="rpct">${r.points}</span></div>`).join('');
    extra = `<div class="card"><div class="card-t">Top 5</div>${top}</div>`;
  } else {
    const d = daysTo(DATA.first_match_date);
    extra = `<div class="card tb"><div class="card-t">Cuenta regresiva</div>
      <div class="stat"><div class="v">${d>=0?d:0}</div><div class="l">días para el arranque</div></div></div>`;
  }
  return `<div class="card ty"><div class="card-t">Premios</div>${rows}</div>
    <div class="card"><div class="card-t">Puntos</div>${score}</div>${extra}`;
}

// ---- HOY ----
function renderHoy(){
  const el=$('hoy');
  if(DATA.state==='pre'){ el.innerHTML = preBriefing(); }
  else { el.innerHTML = liveBriefing(); }
}
function daysTo(iso){const t=new Date();t.setHours(0,0,0,0);const d=new Date(iso+'T00:00:00');return Math.round((d-t)/86400000);}
function preBriefing(){
  const opener = DATA.matches[0];
  const dleft = daysTo(DATA.first_match_date);
  const dtxt = dleft>1?`Faltan ${dleft} días`:(dleft===1?'¡Mañana arranca!':(dleft===0?'¡Hoy arranca!':'En marcha'));
  const c = DATA.consensus;
  // matches with highest agreement (group is most sure)
  const sure = DATA.matches.map(m=>({m,a:c.per_match[m.num].agreement}))
                 .sort((x,y)=>y.a-x.a).slice(0,4);
  const roster = DATA.participants.map(p=>
    `<span class="chip"><span class="av" style="${avBg(byId[p.id].color)}">${initials(p.display)}</span>${p.display}</span>`).join('');
  return `
  <div class="bento">
    <div class="hero sp7">
      <div class="k">${dtxt}</div>
      <div class="big"><span class="num">${dleft>=0?dleft:''}</span><span style="font-size:22px;font-weight:700"> ${dleft===1?'día':'días'}</span></div>
      <div class="match">${fl(opener.hc)} ${opener.home} vs ${opener.away} ${fl(opener.ac)}</div>
      <div class="when">${fdate(opener.date)} · primer partido del Mundial</div>
    </div>

    <div class="card sp5"><div class="card-t">En lo que más coincide el grupo</div>
      ${sure.map(s=>{const m=s.m;
        return `<div class="pk"><span class="a">${m.home} ${fl(m.hc)}</span><span class="s" style="background:transparent;font-weight:800;color:var(--green)">${Math.round(s.a*100)}%</span><span class="b">${fl(m.ac)} ${m.away}</span></div>`;
      }).join('')}
      <div class="sub" style="font-size:12px;color:var(--muted);margin-top:8px">% del grupo que coincide en el resultado</div>
    </div>

    <div class="card sp4 tb"><div class="card-t">Jugadores</div>

  if(I.most_valuable){const m=matchByNum[I.most_valuable.match_num];const who=I.most_valuable.who.map(nm);

function openMatch(num){
  const m=matchByNum[num]; const r=m.result;
  const rule=DATA.scoring;
  const out=s=> s[0]>s[1]?'H':(s[0]<s[1]?'A':'D');
  const rows=DATA.participants.map(p=>{
    const pk=DATA.picks[p.id][num];
    let tag='', pts='';
    if(pk && r){
      if(pk[0]===r[0]&&pk[1]===r[1]){tag='exact';pts=`+${rule.exact}`;}
      else if(out(pk)===out(r)){tag='outcome';pts=`+${rule.outcome}`;}
      else{tag='miss';pts='0';}
    }
    return {id:p.id,pk,tag,pts};
  });
  if(r) rows.sort((a,b)=>({exact:0,outcome:1,miss:2,'':3}[a.tag])-({exact:0,outcome:1,miss:2,'':3}[b.tag]));
  const c=DATA.consensus.per_match[num];
  const scTxt = r?`${r[0]} - ${r[1]}`:'Pendiente';
  const body=rows.map(x=>{
    const s=x.pk?`${x.pk[0]}-${x.pk[1]}`:'—';
    return `<div class="mp ${x.tag}"><span class="mp-n">${nm(x.id)}</span><span class="mp-s">${s}</span><span class="mp-p">${x.pts}</span></div>`;
  }).join('');
  $('modalbody').innerHTML = `
    <div class="mh-top">
      <div class="mh-g">Grupo ${m.group} · ${fdate(m.date)}${m.simultaneous?' · misma hora que el otro del grupo':''}</div>
      <div class="mh-teams"><span>${fl(m.hc)} ${m.home}</span><span class="mh-sc ${r?'':'pend'}">${scTxt}</span><span style="text-align:right">${m.away} ${fl(m.ac)}</span></div>
      <div class="mh-cons">El grupo se fue por <b>${c.modal_outcome==='H'?m.home:(c.modal_outcome==='A'?m.away:'el empate')}</b> · marcador más elegido <b>${c.top_score}</b> (${c.top_score_count})</div>
    </div>
    <div class="mp-list">${body}</div>`;
  $('modal').classList.add('open');
}

// ---- sparkline (tendencia de lugar) ----
function spark(pid){
  const s=DATA.bump.series[pid]; if(!s||s.length<2) return '';
  const N=DATA.n_participants, w=58, h=18, pad=2;
  const xs=(i)=>pad+i*(w-2*pad)/(s.length-1);
  const ys=(r)=>pad+(r-1)*(h-2*pad)/Math.max(N-1,1);
  const pts=s.map((r,i)=>`${xs(i).toFixed(1)},${ys(r).toFixed(1)}`).join(' ');
  const up = s[s.length-1] <= s[0];
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="1.8" stroke-linejoin="round"/><circle cx="${xs(s.length-1)}" cy="${ys(s[s.length-1])}" r="2.2" fill="${up?'var(--green)':'var(--red)'}"/></svg>`;
}

// ---- EVOLUCIÓN (bump chart de posiciones) ----
function renderEvolucion(){
  const el=$('evolucion');
  const B=DATA.bump;
  if(B.dates.length<2){
    el.innerHTML=`<div class="card"><div class="empty">
      <div class="ic">🏁</div><div class="h">El Mundial arranca el 11 de junio</div>
      <p>Aquí verás cómo sube y baja cada quien después de cada día de partidos.</p></div></div>`;
    return;
  }
  const N=DATA.n_participants, nD=B.dates.length;
  const mL=30,mR=118,mT=18,mB=30, rowH=22;
  const innerW=Math.max(560, (nD-1)*90), innerH=(N-1)*rowH;
  const W=mL+innerW+mR, H=mT+innerH+mB;
  const x=i=>mL+(nD===1?0:i*innerW/(nD-1));
  const y=r=>mT+(r-1)*rowH;
  let svg=`<svg class="bump" id="bumpsvg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // grid + rank labels
  for(let r=1;r<=N;r++){ svg+=`<line class="grid" x1="${mL}" y1="${y(r)}" x2="${mL+innerW}" y2="${y(r)}"/>`;
    if(r===1||r%5===0||r===N) svg+=`<text x="${mL-8}" y="${y(r)+4}" text-anchor="end" font-size="10" fill="#8A929E">${r}</text>`; }
  // date labels
  B.dates.forEach((d,i)=>{const dd=new Date(d+'T12:00:00');
    svg+=`<text x="${x(i)}" y="${H-10}" text-anchor="middle" font-size="10" fill="#8A929E">${dd.getDate()} ${MES[dd.getMonth()]}</text>`;});
  // lines + dots + end labels
  DATA.participants.forEach(p=>{
    const s=B.series[p.id], col=byId[p.id].color;
    const pts=s.map((r,i)=>`${x(i)},${y(r)}`).join(' ');
    svg+=`<polyline class="pl" data-pid="${p.id}" points="${pts}" stroke="${col}"/>`;
    s.forEach((r,i)=>{svg+=`<circle class="dot" data-pid="${p.id}" cx="${x(i)}" cy="${y(r)}" r="3" fill="${col}"/>`;});
    const lr=s[s.length-1];
    svg+=`<text class="endlab" data-pid="${p.id}" x="${mL+innerW+8}" y="${y(lr)+4}" fill="${col}">${lr}. ${p.display}</text>`;
  });
  svg+=`</svg>`;
  const legend=DATA.participants.map(p=>`<span class="lg" data-pid="${p.id}"><span class="lgd" style="background:${byId[p.id].color}"></span>${p.display}</span>`).join('');
  el.innerHTML=`<div class="banner">Posición de cada quien día a día. Toca un nombre para seguir su línea.</div>
    <div class="card"><div class="card-t">Evolución de posiciones</div>
      <div class="bump-wrap">${svg}</div>
      <div class="bump-legend" id="bumplegend">${legend}</div></div>`;
  // interacción: hover = vista previa, click = fijar
  const sv=$('bumpsvg'), lg=$('bumplegend');
  let locked=null;
  function apply(pid){
    sv.classList.toggle('focus',!!pid);
    sv.querySelectorAll('[data-pid]').forEach(n=>n.classList.toggle('on',n.getAttribute('data-pid')===pid));
    lg.querySelectorAll('.lg').forEach(n=>n.classList.toggle('on',n.getAttribute('data-pid')===pid));
  }
  function wire(root){
    root.addEventListener('mouseover',e=>{const t=e.target.closest('[data-pid]');if(t)apply(t.getAttribute('data-pid'));});
    root.addEventListener('mouseout',()=>apply(locked));
    root.addEventListener('click',e=>{const t=e.target.closest('[data-pid]');const pid=t?t.getAttribute('data-pid'):null;locked=(locked===pid)?null:pid;apply(locked);});
  }
  wire(sv); wire(lg);
}

// ---- animaciones (conteo de números y trazo del bump chart) ----
const REDUCE_MOTION = matchMedia('(prefers-reduced-motion: reduce)').matches;
const cntDone = new Set();
function animateCounts(id){
  if(cntDone.has(id) || REDUCE_MOTION) return;
  cntDone.add(id);
  document.querySelectorAll(`#${id} .stat .v, #${id} .pchip .v, #${id} .hero .num`).forEach(el=>{
    const raw=el.textContent.trim();
    if(!/^\d+(\.\d+)?$/.test(raw)) return;
    const target=parseFloat(raw), dec=(raw.split('.')[1]||'').length;
    const t0=performance.now(), dur=650;
    function step(t){
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      el.textContent=(target*e).toFixed(dec);
      if(p<1) requestAnimationFrame(step); else el.textContent=raw;
    }
    requestAnimationFrame(step);
  });
}
let bumpDrawn=false;
function animateBump(){
  const sv=$('bumpsvg');
  if(!sv || bumpDrawn) return;
  bumpDrawn=true;
  if(REDUCE_MOTION) return;
  sv.querySelectorAll('.pl').forEach((pl,i)=>{
    const L=pl.getTotalLength();
    pl.style.strokeDasharray=L; pl.style.strokeDashoffset=L;
    pl.getBoundingClientRect();
    pl.style.transition=`stroke-dashoffset .9s ${i*35}ms cubic-bezier(.3,.6,.3,1)`;
    pl.style.strokeDashoffset='0';
  });
  sv.querySelectorAll('.dot').forEach((d,i)=>{
    d.style.opacity='0';
    d.style.transition=`opacity .25s ${250+i*6}ms`;
    requestAnimationFrame(()=>{d.style.opacity='1';});
  });
  // al terminar, limpia estilos inline para no pelear con el modo "focus"
  setTimeout(()=>{
    sv.querySelectorAll('.pl').forEach(pl=>{pl.style.strokeDasharray='';pl.style.strokeDashoffset='';pl.style.transition='';});
    sv.querySelectorAll('.dot').forEach(d=>{d.style.opacity='';d.style.transition='';});
  },2200);
}

// ---- nav ----
function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id===id));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.s===id));
  window.scrollTo({top:0,behavior:'smooth'});
  animateCounts(id);
  if(id==='evolucion') animateBump();
}
$('nav').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)show(b.dataset.s);});

// ---- init ----
renderHoy(); renderTabla(); renderCalendario(); renderParticipantes(); renderEvolucion();
animateCounts('hoy');
$('foot').textContent = `Actualizado el ${fdate(DATA.generated_utc.slice(0,10))} · ${DATA.n_participants} jugadores`;
</script>
