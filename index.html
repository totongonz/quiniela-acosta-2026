const FLAG_EMOJI_OK = (function(){
  try{
    const cv=document.createElement('canvas');cv.width=cv.height=24;
    const g=cv.getContext('2d');g.textBaseline='top';g.font='20px sans-serif';
    g.fillText('\u{1F1F2}\u{1F1FD}',0,0);
    const d=g.getImageData(0,0,24,24).data;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]>8 && (Math.abs(d[i]-d[i+1])>16 || Math.abs(d[i+1]-d[i+2])>16)) return true;
    }
    return false;
  }catch(e){return true;}
})();
function flagEmoji(code){
  if(code==='gb-eng') return '\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}';
  if(code==='gb-sct') return '\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}';
  return String.fromCodePoint(...[...code.toUpperCase()].map(ch=>127397+ch.charCodeAt(0)));
}
function fl(code){
  if(!code) return '';
  return FLAG_EMOJI_OK
    ? `<span class="fl">${flagEmoji(code)}</span>`
    : `<img class="flimg" src="https://flagcdn.com/24x18/${code}.png" srcset="https://flagcdn.com/48x36/${code}.png 2x" width="20" height="15" alt="" loading="lazy">`;
}

// ---- barra lateral (escritorio): premios, puntos y contexto ----
function railHTML(){
  const live = DATA.state!=='pre';
  const st = DATA.standings;
  const ic = {first:'🏆',second:'🥈',last:'🔻'};
  // titular actual de cada premio según r.prize (respeta empates: "Ana +2")
  const holder = k=>{
    const hs = st.filter(r=>r.prize===k);
    if(!hs.length) return '';
    return nm(hs[0].id)+(hs.length>1?` +${hs.length-1}`:'');
  };
  const rows = DATA.prize.structure.map(p=>{
    const h = live ? holder(p.key) : '';
    return `<div class="rrow">
      <span class="ric">${ic[p.key]||'·'}</span>
      <span class="rlab">${p.label}${h?` · <b>${h}</b>`:''}</span>
      <span class="rpct">${p.pct}%</span></div>`;
  }).join('');
  const score = `<div class="rrow"><span class="ric">🎯</span><span class="rlab">Marcador exacto</span><span class="rpct">+${DATA.scoring.exact}</span></div>
    <div class="rrow"><span class="ric">✓</span><span class="rlab">Solo el resultado</span><span class="rpct">+${DATA.scoring.outcome}</span></div>`;
  let extra='';
  if(live){
    const top = st.slice(0,5).map(r=>`<div class="rrow">
      <span class="ric" style="font-weight:800;color:var(--muted)">${r.rank}</span>
      <span class="rlab">${nm(r.id)}</span><span class="rpct">${r.points}</span></div>`).join('');
    extra = `<div class="card"><div class="card-t">Top 5</div>${top}</div>`;
  } else {
    const d = daysTo(DATA.first_match_date);
    extra = `<div class="card tb"><div class="card-t">Cuenta regresiva</div>
      <div class="stat"><div class="v">${d>=0?d:0}</div><div class="l">días para el arranque</div></div></div>`;
  }
  return `<div class="card ty"><div class="card-t">Premios</div>${rows}</div>
    <div class="card"><div class="card-t">Puntos</div>${score}</div>${extra}`;
}

function daysTo(iso){const t=new Date();t.setHours(0,0,0,0);const d=new Date(iso+'T00:00:00');return Math.round((d-t)/86400000);}

                 .sort((x,y)=>y.a-x.a).slice(0,4);
  const roster = DATA.participants.map(p=>

function liveBriefing(){
  const d=DATA.daily; const st=DATA.standings;
  const top3=st.slice(0,3);
  // medalla y altura según el RANK real (con empates puede haber 1,1,1 o 1,2,2)
  const medalByRank={1:'#F2B705',2:'#C2C7CF',3:'#D08B45'};   // oro / plata / bronce
  const hByRank={1:112,2:80,3:62};
  const order=[1,0,2];   // 2°, 1°, 3° para que el 1° quede al centro y más alto
  const pod = order.filter(i=>top3[i]).map(i=>{
    const r=top3[i];
    const col=medalByRank[r.rank]||'#C2C7CF', h=hByRank[r.rank]||62;
    return `<div style="flex:1;text-align:center">
      <div style="background:linear-gradient(180deg,${col},${col}cc);height:${h}px;border-radius:14px 14px 6px 6px;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-weight:800;font-size:17px;padding-bottom:7px;text-shadow:0 1px 2px rgba(0,0,0,.22)">${r.rank}</div>
      <div style="font-weight:700;font-size:13.5px;margin-top:9px">${nm(r.id)}</div>
      <div style="font-size:12px;color:var(--muted)">${r.points} pts</div></div>`;
  }).join('');
  let pod_id='—', pod_sub='0 pts ese día';
  if(d&&d.player_of_day&&d.player_of_day.id){
    const P=d.player_of_day, t=P.n_tied||1;
    pod_id=nm(P.id)+(t>1?` +${t-1}`:'');
    pod_sub=`${P.points} pts ese día${t>1?` · empate entre ${t}`:''}`;
  }
  const cln=d&&d.top_climber?d.top_climber:null;
  const fll=d&&d.top_faller?d.top_faller:null;
  return `
  <div class="banner">Resultados al <b>${d?fdate(d.date):'—'}</b> · actualizado cada mañana</div>
  <div class="bento">
    <div class="card sp7"><div class="card-t">Podio</div>
      <div style="display:flex;gap:10px;align-items:flex-end">${pod}</div></div>
    <div class="card sp5 ty"><div class="card-t">Jugador del día</div><div class="stat"><div class="v">${pod_id}</div><div class="l">${pod_sub}</div></div></div>
    <div class="card sp4 tg"><div class="card-t">Mayor subida</div><div class="stat"><div class="v" style="color:var(--green)">${cln?nm(cln.id):'—'}</div><div class="l">${cln&&cln.move>0?'▲ '+cln.move+' lugares':'sin cambios'}</div></div></div>
    <div class="card sp4 tr"><div class="card-t">Mayor caída</div><div class="stat"><div class="v" style="color:var(--red)">${fll?nm(fll.id):'—'}</div><div class="l">${fll&&fll.move<0?'▼ '+Math.abs(fll.move)+' lugares':'sin cambios'}</div></div></div>
    ${insightCards()}
  </div>
  ${hoyJuegan()}`;
}
function hoyJuegan(){
  // Partidos de hoy aún sin resultado (según la fecha del dispositivo)
  const t=new Date();
  const iso=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const ms=DATA.matches.filter(m=>m.date===iso && !m.result);
  if(!ms.length) return '';
  return `<div class="card" style="margin-top:16px"><div class="card-t">Hoy juegan · ${ms.length} partido${ms.length>1?'s':''}</div>
    ${ms.map(mrow).join('')}</div>`;
}
function insightCards(){
  const I=DATA.insights; if(!I) return '';
  const stt=DATA.match_stats, st=DATA.standings;
  const r0=I.streak[0];
  const racha=`<div class="card sp4 tb"><div class="card-t">En racha</div><div class="stat"><div class="v">${nm(r0.id)}</div><div class="l">${r0.pts} pts en ${I.n_last_dates>1?'los últimos '+I.n_last_dates+' días':'el último día'}</div></div></div>`;
  let mv=`<div class="card sp6"><div class="card-t">Jugada más valiosa</div><div class="stat"><div class="v">—</div><div class="l">aún sin marcadores exactos</div></div></div>`;
  if(I.most_valuable){const m=matchByNum[I.most_valuable.match_num];const who=I.most_valuable.who.map(nm);
    const whoTxt=who.length===1?`Solo ${who[0]}`:`${who.length} jugadores`;
    mv=`<div class="card sp6 click" onclick="openMatch(${I.most_valuable.match_num})"><div class="card-t">Jugada más valiosa</div><div class="stat"><div class="v" style="font-size:19px">${whoTxt}</div><div class="l">le atinó al ${I.most_valuable.score} de ${m.home} vs ${m.away}</div></div></div>`;}
  let hard='';
  if(I.hardest_match){const m=matchByNum[I.hardest_match];const s=stt[I.hardest_match];
    const sc=m.result?` ${m.result[0]}-${m.result[1]} `:' vs ';
    hard=`<div class="card sp6 click" onclick="openMatch(${I.hardest_match})"><div class="card-t">Partido más difícil</div><div class="stat"><div class="v" style="font-size:18px">${m.home}${sc}${m.away}</div><div class="l">solo ${s.n_points} de ${s.n_pick} sumaron puntos</div></div></div>`;}
  const last=st[st.length-1], above=st[st.length-2];
  const diff=above?(above.points-last.points):0;
  const fondoSub = !above?'último lugar':(diff===0?'empatado en el fondo':`a ${diff} pts de salir del fondo`);
  const fondo=`<div class="card sp12 tr"><div class="card-t" style="color:var(--red)">Pelea por el fondo · 10%</div><div class="stat" style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap"><div class="v" style="color:var(--red)">${nm(last.id)}</div><div class="l">${fondoSub}</div></div></div>`;
  return racha+mv+hard+fondo;
}

function mrow(m){
  const r=m.result;
  const sc = r?`${r[0]} - ${r[1]}`:'vs';
  return `<div class="mrow" onclick="openMatch(${m.num})">
    <span class="mn">#${m.num}</span>
    <span class="ta">${m.home} ${fl(m.hc)}</span>

    <span class="tb">${fl(m.ac)} ${m.away}</span>

}
function renderCalendario(){
  const el=$('calendario');
  const dates=[...new Set(DATA.matches.map(m=>m.date))].sort();
  const days = dates.map(dt=>{
    const ms=DATA.matches.filter(m=>m.date===dt);
    const isFinal = ms.some(m=>m.simultaneous);
    let body;
    if(isFinal){
      // Última jornada: agrupa por grupo (los 2 de cada grupo van a la misma hora)
      const groups=[...new Set(ms.map(m=>m.group))];
      body = groups.map(g=>{
        const gm=ms.filter(m=>m.group===g);
        return `<div class="card" style="padding:8px 10px;margin-bottom:10px">
          <div class="simul">Grupo ${g} · los dos partidos se juegan a la misma hora</div>
          ${gm.map(mrow).join('')}</div>`;
      }).join('');
    } else {
      body = `<div class="card" style="padding:8px 10px">${ms.map(mrow).join('')}</div>`;
    }
    return `<div class="day"><div class="day-h"><span class="d">${fdate(dt)}</span><span class="n">${ms.length} partidos</span></div>${body}</div>`;
  }).join('');
  el.innerHTML = `<div class="split"><div class="main">${days}</div><aside class="rail">${railHTML()}</aside></div>`;
}

// ---- Detalle de partido (todos los pronósticos) ----
function openMatch(num){
  const m=matchByNum[num]; const r=m.result;
  const rule=DATA.scoring;
  const out=s=> s[0]>s[1]?'H':(s[0]<s[1]?'A':'D');
  const rows=DATA.participants.map(p=>{
    const pk=DATA.picks[p.id][num];
    let tag='', pts='';
    if(pk && r){
      if(pk[0]===r[0]&&pk[1]===r[1]){tag='exact';pts=`+${rule.exact}`;}
      else if(out(pk)===out(r)){tag='outcome';pts=`+${rule.outcome}`;}
      else{tag='miss';pts='0';}
    }
    return {id:p.id,pk,tag,pts};
  });
  if(r) rows.sort((a,b)=>({exact:0,outcome:1,miss:2,'':3}[a.tag])-({exact:0,outcome:1,miss:2,'':3}[b.tag]));
  const c=DATA.consensus.per_match[num];
  const scTxt = r?`${r[0]} - ${r[1]}`:'Pendiente';
  const body=rows.map(x=>{
    const s=x.pk?`${x.pk[0]}-${x.pk[1]}`:'—';
    return `<div class="mp ${x.tag}"><span class="mp-n">${nm(x.id)}</span><span class="mp-s">${s}</span><span class="mp-p">${x.pts}</span></div>`;
  }).join('');
  $('modalbody').innerHTML = `
    <div class="mh-top">
      <div class="mh-g">Grupo ${m.group} · ${fdate(m.date)}${m.simultaneous?' · misma hora que el otro del grupo':''}</div>
      <div class="mh-teams"><span>${fl(m.hc)} ${m.home}</span><span class="mh-sc ${r?'':'pend'}">${scTxt}</span><span style="text-align:right">${m.away} ${fl(m.ac)}</span></div>
      <div class="mh-cons">El grupo se fue por <b>${c.modal_outcome==='H'?m.home:(c.modal_outcome==='A'?m.away:'el empate')}</b> · marcador más elegido <b>${c.top_score}</b> (${c.top_score_count})</div>
    </div>
    <div class="mp-list">${body}</div>`;
  $('modal').classList.add('open');
}
function closeModal(){ $('modal').classList.remove('open'); }

function pickTag(pk,r){
  if(!pk||!r) return '';
  const o=s=>s[0]>s[1]?'H':(s[0]<s[1]?'A':'D');
  if(pk[0]===r[0]&&pk[1]===r[1]) return 'exact';
  return o(pk)===o(r)?'outcome':'miss';
}

function profileHeader(pid){
  const row=DATA.standings.find(r=>r.id===pid);
  if(DATA.state==='pre'||!row||row.graded===0){
    return `<div class="prof"><div class="pchip"><div class="v">72</div><div class="l">predicciones</div></div></div>`;
  }
  const prec=row.graded?Math.round((row.exacts+row.outcomes)/row.graded*100):0;
  const pbd=DATA.points_by_date[pid]||{};
  let bestV=0;Object.values(pbd).forEach(v=>{if(v>bestV)bestV=v;});
  return `<div class="prof">
    <div class="pchip"><div class="v">#${row.rank}</div><div class="l">lugar</div></div>
    <div class="pchip"><div class="v">${row.points}</div><div class="l">puntos</div></div>
    <div class="pchip"><div class="v">${row.exacts}</div><div class="l">exactos</div></div>
    <div class="pchip"><div class="v">${row.outcomes}</div><div class="l">resultados</div></div>
    <div class="pchip"><div class="v">${prec}%</div><div class="l">precisión</div></div>
    <div class="pchip"><div class="v">${bestV}</div><div class="l">mejor día</div></div>
  </div>`;
}
function h2hHeader(a,b){
  const ra=DATA.standings.find(r=>r.id===a), rb=DATA.standings.find(r=>r.id===b);
  let agree=0; DATA.matches.forEach(m=>{const pa=DATA.picks[a][m.num],pb=DATA.picks[b][m.num];if(pa&&pb&&pa[0]===pb[0]&&pa[1]===pb[1])agree++;});
  let lead='';
  if(DATA.state!=='pre'&&ra&&rb){const df=ra.points-rb.points;
    lead=df>0?`${nm(a)} va arriba por ${df}`:(df<0?`${nm(b)} va arriba por ${-df}`:'Van empatados');}
  return `<div class="prof">
    <div class="pchip"><div class="v">${ra?ra.points:0}</div><div class="l">${nm(a)}</div></div>
    <div class="pchip"><div class="v">${rb?rb.points:0}</div><div class="l">${nm(b)}</div></div>
    <div class="pchip"><div class="v">${agree}</div><div class="l">marcadores iguales</div></div>
    ${lead?`<div class="pchip" style="flex:1;min-width:150px"><div class="v" style="font-size:15px">${lead}</div><div class="l">en puntos</div></div>`:''}
  </div>`;
}
function drawParticipant(pid,pid2){
  const groups=[...new Set(DATA.matches.map(m=>m.group))];
  let html='';
  if(!pid2||pid2===pid){
    html+=profileHeader(pid);
    groups.forEach(g=>{
      html+=`<div class="g">Grupo ${g}</div>`;
      DATA.matches.filter(m=>m.group===g).forEach(m=>{
        const pk=DATA.picks[pid][m.num];const s=pk?`${pk[0]}-${pk[1]}`:'—';
        html+=`<div class="pk" onclick="openMatch(${m.num})" style="cursor:pointer"><span class="a">${m.home} ${fl(m.hc)}</span><span class="s ${pickTag(pk,m.result)}">${s}</span><span class="b">${fl(m.ac)} ${m.away}</span></div>`;
      });
    });
  } else {
    html+=h2hHeader(pid,pid2);
    html+=`<div class="cmp cmp-h"><span class="a"></span><span class="s">${nm(pid)}</span><span class="s">${nm(pid2)}</span><span class="b"></span></div>`;
    groups.forEach(g=>{
      html+=`<div class="g">Grupo ${g}</div>`;
      DATA.matches.filter(m=>m.group===g).forEach(m=>{
        const pa=DATA.picks[pid][m.num], pb=DATA.picks[pid2][m.num];
        const sa=pa?`${pa[0]}-${pa[1]}`:'—', sb=pb?`${pb[0]}-${pb[1]}`:'—';
        html+=`<div class="cmp" onclick="openMatch(${m.num})" style="cursor:pointer"><span class="a">${m.home} ${fl(m.hc)}</span><span class="s ${pickTag(pa,m.result)}">${sa}</span><span class="s ${pickTag(pb,m.result)}">${sb}</span><span class="b">${fl(m.ac)} ${m.away}</span></div>`;
      });
    });
  }
  $('pbody').innerHTML=html;
}

// ---- sparkline (tendencia de lugar) ----
function spark(pid){
  const s=DATA.bump.series[pid]; if(!s||s.length<2) return '';
  const N=DATA.n_participants, w=58, h=18, pad=2;
  const xs=(i)=>pad+i*(w-2*pad)/(s.length-1);
  const ys=(r)=>pad+(r-1)*(h-2*pad)/Math.max(N-1,1);
  const pts=s.map((r,i)=>`${xs(i).toFixed(1)},${ys(r).toFixed(1)}`).join(' ');
  const up = s[s.length-1] <= s[0];
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="1.8" stroke-linejoin="round"/><circle cx="${xs(s.length-1)}" cy="${ys(s[s.length-1])}" r="2.2" fill="${up?'var(--green)':'var(--red)'}"/></svg>`;
}

// ---- EVOLUCIÓN (bump chart de posiciones) ----
function renderEvolucion(){
  const el=$('evolucion');
  const B=DATA.bump;
  if(B.dates.length<1){
    el.innerHTML=`<div class="card"><div class="empty">
      <div class="ic">🏁</div><div class="h">Aún no hay resultados</div>
      <p>En cuanto se jueguen los primeros partidos verás aquí cómo sube y baja cada quien.</p></div></div>`;
    return;
  }
  const N=DATA.n_participants;
  // Punto de arranque sintético: todos parten parejos de un mismo punto ("Inicio"),
  // en vez de heredar un primer rank que con empates depende del orden alfabético.
  const START=(N+1)/2;
  const dates=['__inicio__', ...B.dates];
  const ser={}; DATA.participants.forEach(p=>{ser[p.id]=[START, ...B.series[p.id]];});
  const nD=dates.length;
  // margen derecho según el nombre más largo (p.ej. "21. Eduardo Machorro")
  const maxLab=Math.max(...DATA.participants.map(p=>(`${N}. ${p.display}`).length));
  const mL=30,mR=Math.max(118,12+Math.ceil(maxLab*6.4)),mT=18,mB=30, rowH=22;
  const innerW=Math.max(560, (nD-1)*90), innerH=(N-1)*rowH;
  const W=mL+innerW+mR;
  const x=i=>mL+(nD===1?0:i*innerW/(nD-1));
  const y=r=>mT+(r-1)*rowH;
  // etiquetas finales sin empalme: con rank empatado se reparten hacia abajo
  const ends=DATA.participants.map(p=>{const s=ser[p.id];return {pid:p.id,lr:s[s.length-1]};})
    .sort((a,b)=>a.lr-b.lr || nm(a.pid).localeCompare(nm(b.pid)));
  const labY={}; let prevY=-1e9;
  ends.forEach(e=>{let yy=y(e.lr); if(yy<prevY+11) yy=prevY+11; prevY=yy; labY[e.pid]=yy;});
  const H=Math.max(mT+innerH+mB, prevY+14);   // que las etiquetas empujadas no se corten
  let svg=`<svg class="bump" id="bumpsvg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // grid + rank labels
  for(let r=1;r<=N;r++){ svg+=`<line class="grid" x1="${mL}" y1="${y(r)}" x2="${mL+innerW}" y2="${y(r)}"/>`;
    if(r===1||r%5===0||r===N) svg+=`<text x="${mL-8}" y="${y(r)+4}" text-anchor="end" font-size="10" fill="#8A929E">${r}</text>`; }
  // date labels ("Inicio" para el punto sintético)
  dates.forEach((d,i)=>{
    const lbl = d==='__inicio__' ? 'Inicio'
      : (dd=>`${dd.getDate()} ${MES[dd.getMonth()]}`)(new Date(d+'T12:00:00'));
    svg+=`<text x="${x(i)}" y="${mT+innerH+20}" text-anchor="middle" font-size="10" fill="#8A929E">${lbl}</text>`;});
  // lines + dots + end labels (sin dots en "Inicio": ahí todos comparten un punto)
  DATA.participants.forEach(p=>{
    const s=ser[p.id], col=byId[p.id].color;
    const pts=s.map((r,i)=>`${x(i)},${y(r)}`).join(' ');
    svg+=`<polyline class="pl" data-pid="${p.id}" points="${pts}" stroke="${col}"/>`;
    s.forEach((r,i)=>{if(i===0)return; svg+=`<circle class="dot" data-pid="${p.id}" cx="${x(i)}" cy="${y(r)}" r="3" fill="${col}"/>`;});
    const lr=s[s.length-1];
    svg+=`<text class="endlab" data-pid="${p.id}" x="${mL+innerW+8}" y="${labY[p.id]+4}" fill="${col}">${lr}. ${p.display}</text>`;
  });
  svg+=`<circle cx="${x(0)}" cy="${y(START)}" r="4" fill="#8A929E"/>`;
  svg+=`</svg>`;
  const legend=DATA.participants.map(p=>`<span class="lg" data-pid="${p.id}"><span class="lgd" style="background:${byId[p.id].color}"></span>${p.display}</span>`).join('');
  el.innerHTML=`<div class="banner">Posición de cada quien día a día. Toca un nombre para seguir su línea.</div>
    <div class="card"><div class="card-t">Evolución de posiciones</div>
      <div class="bump-wrap">${svg}</div>
      <div class="bump-legend" id="bumplegend">${legend}</div></div>`;
  // interacción: hover = vista previa, click = fijar
  const sv=$('bumpsvg'), lg=$('bumplegend');
  let locked=null;
  function apply(pid){
    sv.classList.toggle('focus',!!pid);
    sv.querySelectorAll('[data-pid]').forEach(n=>n.classList.toggle('on',n.getAttribute('data-pid')===pid));
    lg.querySelectorAll('.lg').forEach(n=>n.classList.toggle('on',n.getAttribute('data-pid')===pid));
  }
  function wire(root){
    root.addEventListener('mouseover',e=>{const t=e.target.closest('[data-pid]');if(t)apply(t.getAttribute('data-pid'));});
    root.addEventListener('mouseout',()=>apply(locked));
    root.addEventListener('click',e=>{const t=e.target.closest('[data-pid]');const pid=t?t.getAttribute('data-pid'):null;locked=(locked===pid)?null:pid;apply(locked);});
  }
  wire(sv); wire(lg);
}

// ---- animaciones (conteo de números y trazo del bump chart) ----
const REDUCE_MOTION = matchMedia('(prefers-reduced-motion: reduce)').matches;
const cntDone = new Set();
function animateCounts(id){
  if(cntDone.has(id) || REDUCE_MOTION) return;
  cntDone.add(id);
  document.querySelectorAll(`#${id} .stat .v, #${id} .pchip .v, #${id} .hero .num`).forEach(el=>{
    const raw=el.textContent.trim();
    if(!/^\d+(\.\d+)?$/.test(raw)) return;
    const target=parseFloat(raw), dec=(raw.split('.')[1]||'').length;
    const t0=performance.now(), dur=650;
    function step(t){
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      el.textContent=(target*e).toFixed(dec);
      if(p<1) requestAnimationFrame(step); else el.textContent=raw;
    }
    requestAnimationFrame(step);
  });
}
let bumpDrawn=false;
function animateBump(){
  const sv=$('bumpsvg');
  if(!sv || bumpDrawn) return;
  bumpDrawn=true;
  if(REDUCE_MOTION) return;
  sv.querySelectorAll('.pl').forEach((pl,i)=>{
    const L=pl.getTotalLength();
    pl.style.strokeDasharray=L; pl.style.strokeDashoffset=L;
    pl.getBoundingClientRect();
    pl.style.transition=`stroke-dashoffset .9s ${i*35}ms cubic-bezier(.3,.6,.3,1)`;
    pl.style.strokeDashoffset='0';
  });
  sv.querySelectorAll('.dot').forEach((d,i)=>{
    d.style.opacity='0';
    d.style.transition=`opacity .25s ${250+i*6}ms`;
    requestAnimationFrame(()=>{d.style.opacity='1';});
  });
  // al terminar, limpia estilos inline para no pelear con el modo "focus"
  setTimeout(()=>{
    sv.querySelectorAll('.pl').forEach(pl=>{pl.style.strokeDasharray='';pl.style.strokeDashoffset='';pl.style.transition='';});
    sv.querySelectorAll('.dot').forEach(d=>{d.style.opacity='';d.style.transition='';});
  },2200);
}

// ---- nav ----
function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id===id));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.s===id));
  window.scrollTo({top:0,behavior:'smooth'});
  animateCounts(id);
  if(id==='evolucion') animateBump();
}
$('nav').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)show(b.dataset.s);});

// ---- init ----
if(DATA.state==='empty'){
  // Porra recién creada, sin quinielas: placeholder amable en vez de tablas vacías.
  const ph = `<div class="card"><div class="empty">
      <div class="ic">📝</div>
      <div class="h">Aún no hay quinielas en esta porra</div>
      <p>En cuanto entren las primeras quinielas, aquí verás la tabla, los
         resultados del día y la evolución de cada quien.</p></div></div>`;
  ['hoy','tabla','calendario','participantes','evolucion'].forEach(id=>{$(id).innerHTML=ph;});
  $('foot').textContent = `${DATA.pool_name} · aún sin participantes`;
}else{
  renderHoy(); renderTabla(); renderCalendario(); renderParticipantes(); renderEvolucion();
  animateCounts('hoy');
  $('foot').textContent = `Actualizado el ${fdate(DATA.generated_utc.slice(0,10))} · ${DATA.n_participants} jugadores`;
}
